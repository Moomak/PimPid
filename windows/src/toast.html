<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>PimPid Toast</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f3f3;
      --surface: #ffffff;
      --border: #d1d1d1;
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --text: #1f1f1f;
      --text-secondary: #616161;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202020;
        --surface: #2d2d2d;
        --border: #404040;
        --text: #f3f3f3;
        --text-secondary: #a0a0a0;
      }
    }

    .theme-light {
      --bg: #f3f3f3;
      --surface: #ffffff;
      --border: #d1d1d1;
      --text: #1f1f1f;
      --text-secondary: #616161;
    }
    .theme-dark {
      --bg: #202020;
      --surface: #2d2d2d;
      --border: #404040;
      --text: #f3f3f3;
      --text-secondary: #a0a0a0;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", "Tahoma", sans-serif;
    }

    .toast {
      display: flex;
      align-items: stretch;
      width: 320px;
      min-height: 68px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      animation: toast-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .toast.fade-out {
      animation: toast-out 0.35s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes toast-in {
      0% { opacity: 0; transform: translateY(12px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toast-out {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(8px) scale(0.97); }
    }

    .toast-accent {
      width: 4px;
      flex-shrink: 0;
      background: var(--accent);
      border-radius: 8px 0 0 8px;
    }

    .toast-body {
      flex: 1;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }

    .toast-direction {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .toast-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast-arrow {
      color: var(--text-secondary);
      margin: 0 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="toast-accent"></div>
  <div class="toast-body">
    <div class="toast-direction" id="toast-direction"></div>
    <div class="toast-text">
      <span id="toast-original"></span>
      <span class="toast-arrow" aria-hidden="true">&#x2192;</span>
      <span id="toast-converted"></span>
    </div>
  </div>
</div>

<script src="toast-renderer.js"></script>
</body>
</html>
